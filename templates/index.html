<!DOCTYPE html>
<html>
<head>
    <title>Text Analyzer Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h2 class="text-center text-primary">Text Analyzer Tool</h2>
            <textarea id="txt" class="form-control mt-3" rows="5" placeholder="type any text..."></textarea>
            <button id="btn" class="btn btn-primary mt-3 w-100">Analyze Now</button>
            
            <div class="row mt-4 text-center">
                <div class="col-6"><h5>Words: <span id="w">0</span></h5></div>
                <div class="col-6"><h5>Chars: <span id="c">0</span></h5></div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
